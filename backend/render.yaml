services:
  - type: web
    name: lamazi-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TENANT_ID
        sync: false
      - key: BRANCH_ID
        sync: false
      - key: TAP_PUBLIC_KEY
        sync: false
      - key: TAP_SECRET_KEY
        sync: false
      - key: TAP_MERCHANT_ID
        sync: false
      - key: ARMADA_BASE_URL
        value: "https://api.armadadelivery.com/v2"
      - key: ARMADA_API_KEY
        sync: false
      - key: ARMADA_API_SECRET
        sync: false
      - key: ARMADA_BRANCH_ID
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: FRONTEND_URL
        sync: false
